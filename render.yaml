services:
  - type: web
    name: md-bot
    runtime: docker
    repo: https://github.com/tincolour/md-bot
    branch: main
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: NODE_VERSION
        value: 18.16.1
      - key: TZ
        value: Africa/Nairobi
    autoDeploy: true
